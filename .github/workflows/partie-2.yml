name: Partie 2 - Release

# Pipeline déclenchée manuellement
on:
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique du dépôt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ">=20"

      - name: Set github user
        run: |
          git config user.email "test@example.com"
          git config user.name "CI/CD - MMI"

      - name: Install dependencies
        run: npm ci

      - name: Run release
        run: npm run release --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
