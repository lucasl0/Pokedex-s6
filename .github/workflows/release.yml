name: "🚀 CI/CD – Pokédex S6"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────
  # 1. LINT – ESLint
  # ─────────────────────────────────────────
  lint:
    name: "🔍 Lint (ESLint)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: github-actions/partie-3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings=100

  # ─────────────────────────────────────────
  # 2. TESTS UNITAIRES – Vitest
  # ─────────────────────────────────────────
  unit-tests:
    name: "🧪 Tests unitaires (Vitest)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: github-actions/partie-3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        continue-on-error: true

      - name: Upload Vitest HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: github-actions/partie-3/html
          retention-days: 7

  # ─────────────────────────────────────────
  # 3. TESTS E2E – Playwright
  # ─────────────────────────────────────────
  e2e-tests:
    name: "🎭 Tests e2e (Playwright)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: github-actions/partie-3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: github-actions/partie-3/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────
  # 4. DEPLOY – rsync SSH (main push uniquement)
  # ─────────────────────────────────────────
  deploy:
    name: "🚀 Déploiement production"
    needs: [lint, unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-actions/partie-3
    env:
      SECRETS_CONTEXT: ${{ toJson(secrets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: github-actions/partie-3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Générer .env
        run: |
          cat > .env << EOF
          VITE_GITHUB_TOKEN=${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_GITHUB_OWNER=lucasl0
          VITE_GITHUB_REPO=Pokedex-s6
          VITE_ACTOR=${{ github.actor }}
          VITE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Protéger .env via .htaccess
        run: |
          cat > .htaccess << 'EOF'
          <FilesMatch "^\.env">
            Order allow,deny
            Deny from all
          </FilesMatch>
          EOF

      - name: Build project
        run: npm run build

      - name: Déployer via rsync SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_SERVER }} >> ~/.ssh/known_hosts
          rsync -avz --delete \
            --exclude '.env' \
            --exclude '.env.*' \
            dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:/var/www/html/

      - name: Migration base de données
        run: |
          MYSQL_USER=$(echo $SECRETS_CONTEXT | jq -r '.MYSQL_USER')
          MYSQL_PASSWORD=$(echo $SECRETS_CONTEXT | jq -r '.MYSQL_PASSWORD')
          MYSQL_SERVER=$(echo $SECRETS_CONTEXT | jq -r '.MYSQL_SERVER')
          MYSQL_DATABASE=$(echo $SECRETS_CONTEXT | jq -r '.MYSQL_DATABASE')
          cat > .my.cnf << EOF
          [client]
          user=$MYSQL_USER
          password=$MYSQL_PASSWORD
          database=$MYSQL_DATABASE
          host=$MYSQL_SERVER
          EOF
          chmod 400 .my.cnf
          if [ -f database.sql ]; then
            mysql --defaults-extra-file=.my.cnf < database.sql
          fi

      - name: Afficher le dernier déployeur
        run: |
          echo "✅ Déployé par : ${{ github.actor }} le $(date +'%d/%m/%Y à %H:%M:%S')"
