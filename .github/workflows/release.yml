name: "🚀 CI/CD – Pokédex S6"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────
  # 1. LINT – ESLint
  # ─────────────────────────────────────────
  lint:
    name: "🔍 Lint (ESLint)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: github-actions/partie-3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────
  # 2. TESTS UNITAIRES – Vitest
  # ─────────────────────────────────────────
  unit-tests:
    name: "🧪 Tests unitaires (Vitest)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: github-actions/partie-3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      # Rapport HTML Vitest — toujours généré (if: always())
      - name: Upload Vitest HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: github-actions/partie-3/html
          retention-days: 7

  # ─────────────────────────────────────────
  # 3. BUILD
  # ─────────────────────────────────────────
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: github-actions/partie-3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          VITE_GITHUB_TOKEN=${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_GITHUB_OWNER=lucasl0
          VITE_GITHUB_REPO=Pokedex-s6
          VITE_ACTOR=${{ github.actor }}
          VITE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Build project
        run: npm run build

      - name: Protect .env via .htaccess
        run: |
          cat > dist/.htaccess << 'HTEOF'
          <FilesMatch "^\.env">
            Order allow,deny
            Deny from all
          </FilesMatch>
          HTEOF

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: github-actions/partie-3/dist
          retention-days: 1

  # ─────────────────────────────────────────
  # 4. TESTS E2E – Playwright
  # ─────────────────────────────────────────
  e2e:
    name: "🎭 Tests E2E (Playwright)"
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: github-actions/partie-3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: github-actions/partie-3/dist

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      # Rapport Playwright — uniquement si les tests échouent
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: github-actions/partie-3/playwright-report
          retention-days: 7

  # ─────────────────────────────────────────
  # 5. DEPLOY – rsync SSH (main push uniquement)
  # ─────────────────────────────────────────
  deploy:
    name: "🚀 Déploiement production"
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H "${{ secrets.SSH_SERVER }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude '.env' \
            --exclude '.env.*' \
            dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:/var/www/html/pokedex/

      - name: Log deploy info
        run: |
          echo "Deploye par : ${{ github.actor }}"
          echo "Date        : $(date -u +'%Y-%m-%d %H:%M UTC')"
          echo "Commit SHA  : ${{ github.sha }}"
