name: Partie 3 - CI/CD Build & Deploy

on:
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ">=20"

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

  # ─────────────────────────────────────────
  # JOB 2 : Tests unitaires
  # ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ">=20"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  # ─────────────────────────────────────────
  # JOB 3 : Tests e2e (Playwright)
  # ─────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ">=20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests (e2e)
        run: npx playwright test --project=chromium --grep @smoke

  e2e-full:
    name: E2E Full Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [e2e-smoke]
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ">=20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run all e2e tests
        run: npx playwright test --project=chromium

  # ─────────────────────────────────────────
  # JOB 4 : Build
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-full]
    defaults:
      run:
        working-directory: github-actions/partie-3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ">=20"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_ACTOR: ${{ github.actor }}
          VITE_BUILD_DATE: ${{ github.event.repository.updated_at }}

      - name: Upload build artifact
        uses: actions/upload-artifact@master
        with:
          name: bundle
          path: github-actions/partie-3/dist

  # ─────────────────────────────────────────
  # JOB 5 : Deploy
  # ─────────────────────────────────────────
  deploy:
    name: Deploy via SSH (rsync)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@master
        with:
          name: bundle
          path: ./dist

      - name: Write SSH key to file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key

      - name: Deploy via rsync
        run: |
          rsync -Pav \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:www/
